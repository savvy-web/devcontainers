# Copilot Setup Steps
#
# Prepares the environment for Copilot cloud agent sessions working on this
# repository. Installs Node.js, pnpm, the devcontainer CLI, and shellcheck so
# the agent can run scripts/validate-feature.sh and pnpm run lint without
# manual setup.

name: "Copilot Setup Steps"
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [.github/workflows/copilot-setup-steps.yml]
  pull_request:
    branches: [main]
    paths: [.github/workflows/copilot-setup-steps.yml]

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Runtime
        id: runtime
        uses: savvy-web/workflow-runtime-action@main

      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Install shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck

      - name: Verify tools
        run: |
          node --version
          pnpm --version
          devcontainer --version
          shellcheck --version

name: Publish Features

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (do not publish)"
        type: boolean
        required: true
        default: true
  push:
    branches: [main]
    paths:
      - "src/**"
      - "test/**"

concurrency:
  group: publish-features
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
    env:
      OCI_REGISTRY: ghcr.io
      FEATURES_NAMESPACE: savvy-web/features
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
    steps:
      - uses: actions/checkout@v7

      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Login to ghcr
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login "${OCI_REGISTRY}" -u "${{ github.actor }}" --password-stdin

      - name: Determine publish order
        run: |
          node .github/scripts/topo-order.js > /tmp/order.json
          {
            echo "## Publish Plan"
            echo ""
            echo "| # | Feature | Version | Publish? | Reason |"
            echo "| - | ------- | ------- | -------- | ------ |"
            node -e "
              const xs = JSON.parse(require('fs').readFileSync('/tmp/order.json','utf8'));
              xs.forEach((f, i) => {
                const flag = f.publish ? '✅' : '⏭️';
                process.stdout.write(\`| \${i+1} | \${f.id} | \${f.version} | \${flag} | \${f.reason} |\n\`);
              });
            "
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Test and publish
        id: run
        run: bash .github/scripts/publish-features.sh

      - name: Generate docs
        if: env.DRY_RUN != 'true' && steps.run.outputs.any_published == '1'
        run: |
          devcontainer features generate-docs \
            --namespace "${FEATURES_NAMESPACE}" \
            --registry "${OCI_REGISTRY}" \
            --github-owner "${{ github.repository_owner }}" \
            --github-repo "${{ github.event.repository.name }}"

      - name: Open docs PR
        if: env.DRY_RUN != 'true' && steps.run.outputs.any_published == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config user.email github-actions@github.com
          git config user.name github-actions
          BRANCH="docs/automated-update-${GITHUB_RUN_ID}"
          git checkout -b "$BRANCH"
          git add 'src/*/README.md' || true
          if git diff --cached --quiet; then
            echo "No README changes; skipping PR"
            exit 0
          fi
          git commit -m 'docs: automated documentation update [skip ci]'
          git push origin "$BRANCH"
          gh pr create \
            --title 'docs: automated documentation update' \
            --body 'Automated README updates generated by the Publish Features workflow.' \
            --base main \
            --head "$BRANCH"

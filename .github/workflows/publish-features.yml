name: Publish Features
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (do not publish)"
        type: boolean
        required: true
        default: true

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      matrix: ${{ steps.features.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker
        uses: docker/setup-buildx-action@v4
      - id: features
        run: |
          node .github/scripts/collect-and-filter-features.js | tee filtered.json
          echo "matrix=$(cat filtered.json)" >> $GITHUB_OUTPUT
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        shell: bash
        working-directory: ${{ github.workspace }}
        continue-on-error: false
  test:
    needs: collect
    if: ${{ needs.collect.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{fromJson(needs.collect.outputs.matrix)}}
    steps:
      - uses: actions/checkout@v6
      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli
      - name: Test Feature
        id: test
        timeout-minutes: 15
        continue-on-error: true
        env:
          FEATURE_ID: ${{ matrix.id }}
        run: |
          FEATURE_JSON="src/${FEATURE_ID}/devcontainer-feature.json"
          SKIP_AUTOGENERATED=$(node -e "
            const j = JSON.parse(require('fs').readFileSync('${FEATURE_JSON}', 'utf8'));
            const deps = j.installsAfter || [];
            process.stdout.write(
              deps.some(d => d.includes('ghcr.io/savvy-web/features/')) ? 'true' : 'false'
            );
          ")
          BASE_IMAGE="mcr.microsoft.com/devcontainers/base:ubuntu"
          ARGS=(-f "$FEATURE_ID" -i "$BASE_IMAGE" --skip-duplicated)
          if [[ "$SKIP_AUTOGENERATED" == "true" ]]; then
            ARGS+=(--skip-autogenerated)
          fi
          set +e
          devcontainer features test "${ARGS[@]}" . 2>&1 | tee /tmp/test.log
          test_exit_code=$?
          set -e
          # Parse the TEST REPORT section into a structured JSON results file so
          # that failure detection does not rely on grepping for emoji characters.
          node .github/scripts/parse-test-results.js
          # Exit non-zero if the CLI failed or any scenario failed.
          node -e "const fs = require('fs'); const cliExit = Number(process.argv[1]); const results = JSON.parse(fs.readFileSync('/tmp/test-results.json','utf8')); process.exit(cliExit !== 0 || !results.allPassed ? 1 : 0)" "$test_exit_code"
      - name: Save result
        if: always()
        run: |
          mkdir -p /tmp/results
          echo "${{ steps.test.outcome }}" > /tmp/results/${{ matrix.id }}.txt
          cp /tmp/test-results.json /tmp/results/${{ matrix.id }}-results.json 2>/dev/null || echo '{"passed":[],"failed":[],"total":0,"allPassed":false}' > /tmp/results/${{ matrix.id }}-results.json
          cp /tmp/test.log /tmp/results/${{ matrix.id }}-test.log 2>/dev/null || echo "No test log" > /tmp/results/${{ matrix.id }}-test.log
      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-result-${{ matrix.id }}
          path: /tmp/results/
      - name: Fail if test failed
        if: steps.test.outcome == 'failure'
        run: exit 1

  summarize:
    needs: [collect, test]
    if: always() && needs.collect.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      all_passed: ${{ steps.check.outputs.all_passed }}
    steps:
      - name: Download all results
        uses: actions/download-artifact@v8
        with:
          pattern: test-result-*
          path: /tmp/results
          merge-multiple: true
      - name: Write summary and check results
        id: check
        run: |
          all_passed=true
          shopt -s nullglob
          result_files=(/tmp/results/*.txt)
          {
            echo "## Feature Test Results"
            echo ""
            if [ ${#result_files[@]} -eq 0 ]; then
              echo "⚠️ No test results found — all test jobs may have been cancelled."
              all_passed=false
            else
              echo "| Feature | Scenario | Result |"
              echo "| ------- | -------- | ------ |"
              for file in "${result_files[@]}"; do
                name=$(basename "$file" .txt)
                result=$(cat "$file")
                results_json="/tmp/results/${name}-results.json"
                if node -e "
                  try {
                    const r = JSON.parse(require('fs').readFileSync('$results_json', 'utf8'));
                    if (r.total > 0) {
                      for (const s of r.passed) process.stdout.write('| \`' + '$name' + '\` | ' + s + ' | ✅ Pass |\n');
                      for (const s of r.failed) process.stdout.write('| \`' + '$name' + '\` | ' + s + ' | ❌ Fail |\n');
                      process.exit(0);
                    }
                  } catch {}
                  process.exit(1);
                " 2>/dev/null; then
                  :
                else
                  if [ "$result" = "success" ]; then
                    echo "| \`$name\` | — | ✅ Pass |"
                  else
                    echo "| \`$name\` | — | ❌ Fail |"
                  fi
                fi
                if [ "$result" != "success" ]; then
                  all_passed=false
                fi
              done
              echo ""
              echo "## Failure Details"
              echo ""
              for file in "${result_files[@]}"; do
                name=$(basename "$file" .txt)
                result=$(cat "$file")
                if [ "$result" != "success" ]; then
                  echo "<details><summary><strong>${name}</strong> — test log</summary>"
                  echo ""
                  echo '```'
                  cat "/tmp/results/${name}-test.log" 2>/dev/null || echo "Log not found"
                  echo '```'
                  echo ""
                  echo "</details>"
                  echo ""
                fi
              done
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          echo "all_passed=$all_passed" >> "$GITHUB_OUTPUT"
      - name: Fail if any test failed
        if: steps.check.outputs.all_passed != 'true'
        run: exit 1

  publish:
    needs: [summarize, collect]
    if: >-
      github.event.inputs.dry_run != 'true' && success() &&
      needs.collect.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
      actions: read
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}
      - name: Check token permissions
        run: |
          echo "--- /rate_limit ---"
          curl -i -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/rate_limit
          echo "--- /user ---"
          curl -i -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/user
          echo "--- /app ---"
          curl -i -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/app
          echo "--- /installation ---"
          curl -i -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/installation
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true
      - name: Publish Features
        uses: devcontainers/action@1082abd5d2bf3a11abccba70eef98df068277772 # v1.4.3
        with:
          generate-docs: "true"
          publish-features: "true"
          base-path-to-features: "./src"
          oci-registry: "ghcr.io"
          features-namespace: "savvy-web/features"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
      - name: Create a PR for Documentation
        id: push_image_info
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          echo "Start."

          # Configure git and Push updates
          git config --global user.email github-actions@github.com
          git config --global user.name github-actions
          git config pull.rebase false

          branch=docs/automated-update-$GITHUB_RUN_ID
          git checkout -b $branch
          message='docs: automated documentation update'

          # Add / update and commit
          git add */**/README.md
          git commit -m 'docs: automated documentation update [skip ci]' || export NO_UPDATES=true

          # Push
          if [ "$NO_UPDATES" != "true" ] ; then
              git push origin "$branch"
              gh api \
                --method POST \
                -H "Accept: application/vnd.github+json" \
                /repos/${GITHUB_REPOSITORY}/pulls \
                -f title="$message" \
              -f body="$message" \
              -f head="$branch" \
              -f base='main'
          fi

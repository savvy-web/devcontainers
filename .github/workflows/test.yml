name: Test Devcontainer Features

on:
  pull_request:
    # push:
    #   branches: [main]

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.features.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Discover features
        id: features
        run: |
          matrix=$(node -e "
            const fs = require('fs');
            const path = require('path');
            const srcRoot = path.resolve('src');
            const testRoot = path.resolve('test');
            if (!fs.existsSync(srcRoot)) { process.stdout.write('[]'); process.exit(0); }
            const entries = fs.readdirSync(srcRoot)
              .filter(f => {
                const featureJson = path.join(srcRoot, f, 'devcontainer-feature.json');
                const testSh = path.join(testRoot, f, 'test.sh');
                return fs.existsSync(featureJson) && fs.existsSync(testSh);
              })
              .map(id => {
                const featureJson = JSON.parse(
                  fs.readFileSync(path.join(srcRoot, id, 'devcontainer-feature.json'), 'utf8')
                );
                const installsAfter = featureJson.installsAfter || [];
                // Skip auto-generated test for features that depend on another
                // local savvy-web feature (e.g. package-manager requires node).
                const skipAutogenerated = installsAfter.some(dep =>
                  dep.includes('ghcr.io/savvy-web/')
                );
                return { id, skipAutogenerated };
              });
            process.stdout.write(JSON.stringify(entries));
          ")
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  test:
    needs: discover
    if: ${{ needs.discover.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Run feature tests
        id: test
        continue-on-error: true
        timeout-minutes: 15
        env:
          FEATURE_ID: ${{ matrix.id }}
          SKIP_AUTOGENERATED: ${{ matrix.skipAutogenerated }}
        run: |
          BASE_IMAGE="mcr.microsoft.com/devcontainers/base:ubuntu"
          ARGS=(-f "$FEATURE_ID" -i "$BASE_IMAGE" --skip-duplicated)
          if [[ "$SKIP_AUTOGENERATED" == "true" ]]; then
            ARGS+=(--skip-autogenerated)
          fi
          echo "::group::devcontainer features test ${ARGS[*]} ."
          devcontainer features test "${ARGS[@]}" . 2>&1 | tee /tmp/test.log
          echo "::endgroup::"
          # devcontainer features test exits 0 even when individual scenarios
          # fail. Detect scenario failures from the TEST REPORT in the output.
          if grep -qF "❌ Failed:" /tmp/test.log 2>/dev/null; then
            exit 1
          fi

      - name: Write step summary
        if: always()
        run: |
          {
            if [[ "${{ steps.test.outcome }}" == "success" ]]; then
              echo "## ✅ ${{ matrix.id }}"
            else
              echo "## ❌ ${{ matrix.id }}"
            fi
            echo ""
            echo "<details><summary>Test log</summary>"
            echo ""
            echo '```'
            cat /tmp/test.log 2>/dev/null || echo "No log captured"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if tests failed
        if: steps.test.outcome == 'failure'
        run: |
          echo "::error::Tests failed for ${{ matrix.id }}. See step summary for details."
          exit 1

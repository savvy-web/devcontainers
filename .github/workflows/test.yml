name: Test Devcontainer Features

on:
  pull_request:
    # push:
    #   branches: [main]

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.features.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Discover features
        id: features
        run: |
          matrix=$(node .github/scripts/discover-features.js)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  test:
    needs: discover
    if: ${{ needs.discover.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Run feature tests
        id: test
        continue-on-error: true
        timeout-minutes: 15
        env:
          FEATURE_ID: ${{ matrix.id }}
          SKIP_AUTOGENERATED: ${{ matrix.skipAutogenerated }}
        run: |
          BASE_IMAGE="mcr.microsoft.com/devcontainers/base:ubuntu"
          ARGS=(-f "$FEATURE_ID" -i "$BASE_IMAGE" --skip-duplicated)
          if [[ "$SKIP_AUTOGENERATED" == "true" ]]; then
            ARGS+=(--skip-autogenerated)
          fi
          echo "::group::devcontainer features test ${ARGS[*]} ."
          devcontainer features test "${ARGS[@]}" . 2>&1 | tee /tmp/test.log
          echo "::endgroup::"
          # Parse the TEST REPORT section into a structured JSON results file so
          # that failure detection does not rely on grepping for emoji characters.
          node .github/scripts/parse-test-results.js
          # Exit non-zero if any scenario failed.
          node -e "process.exit(JSON.parse(require('fs').readFileSync('/tmp/test-results.json','utf8')).allPassed ? 0 : 1)"

      - name: Write step summary
        if: always()
        run: |
          {
            if [[ "${{ steps.test.outcome }}" == "success" ]]; then
              echo "## ✅ ${{ matrix.id }}"
            else
              echo "## ❌ ${{ matrix.id }}"
            fi
            echo ""
            node -e "
              try {
                const r = JSON.parse(require('fs').readFileSync('/tmp/test-results.json', 'utf8'));
                if (r.total > 0) {
                  process.stdout.write('| Scenario | Result |\n| --- | --- |\n');
                  for (const s of r.passed) process.stdout.write('| ' + s + ' | ✅ Pass |\n');
                  for (const s of r.failed) process.stdout.write('| ' + s + ' | ❌ Fail |\n');
                  process.stdout.write('\n');
                }
              } catch {}
            " 2>/dev/null
            echo "<details><summary>Test log</summary>"
            echo ""
            echo '```'
            cat /tmp/test.log 2>/dev/null || echo "No log captured"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if tests failed
        if: steps.test.outcome == 'failure'
        run: |
          echo "::error::Tests failed for ${{ matrix.id }}. See step summary for details."
          exit 1

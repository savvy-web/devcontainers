name: Test Devcontainer Features

on:
  pull_request:
    # push:
    #   branches: [main]

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.tests.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Discover test directories
        id: tests
        run: |
          matrix=$(node .github/scripts/collect-test-dirs.js)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  test-features:
    needs: collect
    if: ${{ needs.collect.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.collect.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # - name: Setup Runtime
      #   id: runtime
      #   uses: savvy-web/workflow-runtime-action@main

      - name: Install feature
        id: install
        continue-on-error: true
        env:
          FEATURE_ID: ${{ matrix.id }}
        run: |
          INSTALL_SCRIPT="features/${FEATURE_ID}/install.sh"
          if [[ ! -f "$INSTALL_SCRIPT" ]]; then
            echo "[ERROR] Install script not found: $INSTALL_SCRIPT" >&2
            exit 1
          fi
          chmod +x "$INSTALL_SCRIPT"
          sudo bash "$INSTALL_SCRIPT" 2>&1 | tee /tmp/install.log

      - name: Run tests
        id: test
        continue-on-error: true
        if: steps.install.outcome == 'success'
        env:
          FEATURE_ID: ${{ matrix.id }}
        run: |
          TEST_SCRIPT="test/${FEATURE_ID}/test.sh"
          if [[ ! -f "$TEST_SCRIPT" ]]; then
            echo "[ERROR] Test script not found: $TEST_SCRIPT" >&2
            exit 1
          fi
          chmod +x "$TEST_SCRIPT"
          sudo bash "$TEST_SCRIPT" 2>&1 | tee /tmp/test.log

      - name: Write step summary
        if: always()
        run: |
          {
            echo "## ${{ matrix.id }}"
            echo ""
            if [[ "${{ steps.install.outcome }}" == "failure" ]]; then
              echo "❌ **Install failed**"
              echo ""
              echo "<details><summary>Install log</summary>"
              echo ""
              echo '```'
              cat /tmp/install.log 2>/dev/null || echo "No install log captured"
              echo '```'
              echo "</details>"
            elif [[ "${{ steps.test.outcome }}" == "failure" ]]; then
              echo "✅ Install succeeded — ❌ **Test failed**"
              echo ""
              echo "<details><summary>Install log</summary>"
              echo ""
              echo '```'
              cat /tmp/install.log 2>/dev/null || echo "No install log captured"
              echo '```'
              echo "</details>"
              echo ""
              echo "<details><summary>Test log</summary>"
              echo ""
              echo '```'
              cat /tmp/test.log 2>/dev/null || echo "No test log captured"
              echo '```'
              echo "</details>"
            else
              echo "✅ Install and test passed"
              echo ""
              echo "<details><summary>Install log</summary>"
              echo ""
              echo '```'
              cat /tmp/install.log 2>/dev/null || echo "No install log captured"
              echo '```'
              echo "</details>"
              echo ""
              echo "<details><summary>Test log</summary>"
              echo ""
              echo '```'
              cat /tmp/test.log 2>/dev/null || echo "No test log captured"
              echo '```'
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if install failed
        if: steps.install.outcome == 'failure'
        run: |
          echo "::error::Install failed for ${{ matrix.id }}. See step summary for details."
          exit 1

      - name: Fail if test failed
        if: steps.test.outcome == 'failure'
        run: |
          echo "::error::Test failed for ${{ matrix.id }}. See step summary for details."
          exit 1

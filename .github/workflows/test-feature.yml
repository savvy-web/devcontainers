name: Test Feature (Local)

on:
  workflow_dispatch:
    inputs:
      id:
        description: "Feature id (e.g. biome, rust, package-manager)"
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Run feature tests
        env:
          FEATURE_ID: ${{ inputs.id }}
        run: bash .github/scripts/test-feature-isolated.sh "${FEATURE_ID}"

name: Test Feature (Local)

on:
  workflow_dispatch:
    inputs:
      id:
        description: "Feature id (e.g. biome, rust, package-manager)"
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Run feature tests
        env:
          FEATURE_ID: ${{ inputs.id }}
        run: |
          FEATURE_JSON="src/${FEATURE_ID}/devcontainer-feature.json"
          if [[ ! -f "$FEATURE_JSON" ]]; then
            echo "[ERROR] Feature not found: src/${FEATURE_ID}" >&2
            exit 1
          fi

          # Skip auto-generated test if the feature depends on another local
          # savvy-web feature (those must be wired in via scenarios instead).
          SKIP_AUTOGENERATED=$(node -e "
            const j = JSON.parse(require('fs').readFileSync('${FEATURE_JSON}', 'utf8'));
            const deps = j.installsAfter || [];
            process.stdout.write(
              deps.some(d => d.includes('ghcr.io/savvy-web/')) ? 'true' : 'false'
            );
          ")

          BASE_IMAGE="mcr.microsoft.com/devcontainers/base:ubuntu"
          ARGS=(-f "$FEATURE_ID" -i "$BASE_IMAGE" --skip-duplicated)
          if [[ "$SKIP_AUTOGENERATED" == "true" ]]; then
            ARGS+=(--skip-autogenerated)
          fi

          set +e
          devcontainer features test "${ARGS[@]}" . 2>&1 | tee /tmp/test.log
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          set -e

          # Parse the TEST REPORT section into a structured JSON results file so
          # that failure detection does not rely on grepping for emoji characters.
          node .github/scripts/parse-test-results.js
          # Exit non-zero if the CLI failed or any scenario failed.
          node -e "const fs = require('fs'); const cliExit = Number(process.argv[1]); const results = JSON.parse(fs.readFileSync('/tmp/test-results.json','utf8')); process.exit(cliExit !== 0 || !results.allPassed ? 1 : 0)" "$TEST_EXIT_CODE"

name: Publish
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (do not publish)"
        type: boolean
        required: true
        default: true

jobs:
  collect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.features.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      # - name: Setup Runtime
      #   id: runtime
      #   uses: savvy-web/workflow-runtime-action@main
      - name: Set up Docker
        uses: docker/setup-buildx-action@v4
      - id: features
        run: |
          node .github/scripts/collect-and-filter-features.js | tee filtered.json
          echo "matrix=$(cat filtered.json)" >> $GITHUB_OUTPUT
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        shell: bash
        working-directory: ${{ github.workspace }}
        continue-on-error: false
  test:
    needs: collect
    if: ${{ fromJson(needs.collect.outputs.matrix).length > 0 }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{fromJson(needs.collect.outputs.matrix)}}
    steps:
      - uses: actions/checkout@v6
      # - name: Setup Runtime
      #   id: runtime
      #   uses: savvy-web/workflow-runtime-action@main
      - name: Test Feature
        run: |
          chmod +x test/${{ matrix.scope }}/${{ matrix.id }}/test.sh
          ./test/${{ matrix.scope }}/${{ matrix.id }}/test.sh

  publish:
    needs: [test, collect]
    if: github.event.inputs.dry_run != true && success() &&
      fromJson(needs.collect.outputs.matrix).length > 0
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{fromJson(needs.collect.outputs.matrix)}}
    steps:
      - uses: actions/checkout@v6
      - name: Setup Runtime
        id: runtime
        uses: savvy-web/workflow-runtime-action@main
      - name: Publish Feature
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # for testing, we will just echo the command instead of running it
          echo "Publishing ${{ matrix.id }} version ${{ matrix.version }} from ${{ matrix.path }}"
          # devcontainer features publish --id ${{ matrix.id }} --version ${{ matrix.version }} --path ${{ matrix.path }} --registry ghcr.io/${{ github.repository_owner }}
